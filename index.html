<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>侨水建设·项目管理控制系统</title>
  <style>
    :root {
      --bg: #eef2f5;
      --panel: #ffffff;
      --ink: #1a2a33;
      --muted: #62707a;
      --line: #d7e0e6;
      --brand: #0b4f6c;
      --brand-soft: #d8ebf4;
      --good: #2f855a;
      --warn: #b7791f;
      --bad: #c53030;
      --shadow: 0 10px 24px rgba(9, 30, 66, 0.08);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, #f7fafc 0%, transparent 26%),
        radial-gradient(circle at 88% 4%, #deecf4 0%, transparent 28%),
        linear-gradient(180deg, #f3f7fa 0%, var(--bg) 56%, #e8edf1 100%);
      min-height: 100vh;
    }

    .shell {
      max-width: 1360px;
      margin: 0 auto;
      padding: 22px;
      display: grid;
      gap: 16px;
      animation: enter 520ms ease-out;
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 18px 22px;
      background:
        linear-gradient(115deg, rgba(11, 79, 108, 0.92) 0%, rgba(14, 100, 135, 0.92) 55%, rgba(24, 127, 146, 0.92) 100%),
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.12) 0 2px, transparent 2px 6px);
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    .hero h1::before {
      content: "";
      display: inline-block;
      width: 16px;
      height: 16px;
      margin-right: 10px;
      border-radius: 4px;
      background: linear-gradient(135deg, #8fd8ff 0%, #d8f1ff 100%);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.35);
      vertical-align: -2px;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -40px;
      width: 170px;
      height: 170px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.24), transparent 65%);
      pointer-events: none;
    }

    .hero h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0.3px;
    }

    .hero p {
      margin: 10px 0 0;
      font-size: 14px;
      color: #d4ecf7;
      max-width: 900px;
      line-height: 1.6;
    }

    .kpi-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 8px 0 10px;
    }

    .kpi-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f8fbfd;
      color: #3d5261;
    }

    .kpi-icon {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      display: inline-grid;
      place-items: center;
      background: #ecf4fa;
      border: 1px solid #d3e3ef;
      color: #355165;
    }

    .kpi-icon svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .kpi:hover {
      transform: translateY(-2px);
    }

    .kpi-chip .label {
      font-size: 12px;
      color: var(--muted);
    }

    .kpi-chip .value {
      font-size: 16px;
      font-weight: 700;
      font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
    }

    .kpi-chip.good .value { color: var(--good); }
    .kpi-chip.warn .value { color: var(--warn); }
    .kpi-chip.bad .value { color: var(--bad); }

    .row {
      display: grid;
      gap: 12px;
      grid-template-columns: 2fr 1fr;
      align-items: stretch;
    }

    .split-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: stretch;
    }

    .head {
      padding: 14px 16px 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 8px;
    }

    .head h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.2px;
    }

    .head small {
      color: var(--muted);
      font-size: 12px;
    }

    .section-body {
      padding: 12px 16px 16px;
    }

    .goal-list {
      display: grid;
      gap: 10px;
    }

    .goal-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      background: #f8fbfd;
    }

    .goal-item .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .bar {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: #e2e9ef;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #0e6c91 0%, #2f855a 100%);
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .source-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #f8fbfd;
    }

    .icon-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 8px;
      color: #5b6a75;
      font-size: 12px;
    }

    .icon-legend span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f8fbfd;
    }

    .icon-legend svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .source-status {
      font-size: 12px;
      color: #3f505f;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid #c9d8e3;
      background: #fff;
    }

    .source-status.active {
      color: #18653e;
      border-color: #b7e0c8;
      background: #e8f7ef;
    }

    .source-status.error {
      color: #9d1f1f;
      border-color: #efb6b6;
      background: #fde8e8;
    }

    .crud-form {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f9fcff;
      padding: 10px;
      margin-bottom: 10px;
      display: grid;
      gap: 8px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .form-grid label {
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: #445968;
    }

    .form-grid input,
    .form-grid textarea {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 7px 8px;
      font: inherit;
      background: #fff;
      color: var(--ink);
      resize: vertical;
    }

    .form-grid textarea {
      min-height: 66px;
    }

    .form-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-secondary {
      background: linear-gradient(180deg, #ffffff 0%, #f3f6f8 100%);
    }

    .btn-danger {
      border-color: #efb6b6;
      color: #9d1f1f;
      background: linear-gradient(180deg, #fff 0%, #fdeeee 100%);
    }

    .btn-small {
      padding: 4px 8px;
      font-size: 12px;
    }

    .action-cell {
      white-space: nowrap;
    }

    .save-state {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      font-size: 11px;
      padding: 1px 7px;
      margin-left: 6px;
      border: 1px solid var(--line);
      background: #fff;
      color: #5b6a75;
    }

    .save-state.saving {
      color: #8a5b12;
      border-color: #f0cf8e;
      background: #fff5e1;
    }

    .save-state.success {
      color: #18653e;
      border-color: #b7e0c8;
      background: #e8f7ef;
    }

    .save-state.error {
      color: #9d1f1f;
      border-color: #efb6b6;
      background: #fde8e8;
    }

    .project-link {
      border: 0;
      background: transparent;
      color: #0b4f6c;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 2px;
      padding: 0;
    }

    .project-link:hover {
      color: #11739a;
    }

    .hidden {
      display: none;
    }

    .finance-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 10px;
    }

    .finance-metrics article {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fbfd;
      padding: 9px 10px;
    }

    .finance-metrics small {
      color: #5f6e79;
      font-size: 12px;
      display: block;
      margin-bottom: 4px;
    }

    .finance-metrics strong {
      font-size: 16px;
      font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
    }

    select, button {
      border-radius: 9px;
      border: 1px solid var(--line);
      padding: 8px 10px;
      background: #fff;
      font: inherit;
      color: var(--ink);
    }

    button {
      cursor: pointer;
      background: linear-gradient(180deg, #ffffff 0%, #eef6fb 100%);
      font-weight: 600;
    }

    button:hover {
      border-color: #a9c0d0;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      padding: 0;
      display: inline-grid;
      place-items: center;
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 880px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 10px 8px;
      vertical-align: top;
    }

    th {
      background: #f1f7fb;
      color: #3b4d5b;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid;
      white-space: nowrap;
    }

    .status.green {
      color: #18653e;
      background: #e8f7ef;
      border-color: #b7e0c8;
    }

    .status.yellow {
      color: #8a5b12;
      background: #fff5e1;
      border-color: #f0cf8e;
    }

    .status.red {
      color: #9d1f1f;
      background: #fde8e8;
      border-color: #efb6b6;
    }

    .modules {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .module {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      display: grid;
    }

    .module-head {
      background: linear-gradient(180deg, #f6fbff 0%, #ebf4fa 100%);
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 6px;
    }

    .module-head h3 {
      margin: 0;
      font-size: 14px;
    }

    .module-head small {
      color: var(--muted);
      font-size: 12px;
    }

    .module ul {
      margin: 0;
      padding: 12px 16px 14px;
      list-style: none;
      display: grid;
      gap: 8px;
      font-size: 13px;
      color: #314351;
    }

    .module li {
      padding-left: 9px;
      border-left: 3px solid #bfd4e2;
    }

    .rhythm {
      display: grid;
      gap: 10px;
    }

    .rhythm-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: #f8fbfd;
    }

    .rhythm-card h4 {
      margin: 0;
      font-size: 14px;
    }

    .rhythm-card p {
      margin: 6px 0 0;
      color: #425a69;
      font-size: 12px;
      line-height: 1.55;
    }

    .decision-summary {
      display: grid;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 3px 10px;
      font-size: 12px;
      color: #3f505f;
      background: #fff;
      margin-right: 6px;
    }

    .footer-note {
      font-size: 12px;
      color: var(--muted);
      padding: 0 2px;
    }

    @media (max-width: 1200px) {
      .kpi-grid { gap: 8px; }

      .row {
        grid-template-columns: 1fr;
      }

      .split-grid {
        grid-template-columns: 1fr;
      }

      .modules {
        grid-template-columns: 1fr;
      }

      .finance-metrics {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .shell {
        padding: 12px;
      }

      .kpi-grid { gap: 6px; }

      .hero h1 {
        font-size: 20px;
      }

      .hero p {
        font-size: 12px;
      }

      table {
        min-width: 760px;
      }

      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="panel hero">
      <h1>侨水建设·项目管理控制系统</h1>
    </section>

    <section class="panel">
      <div class="section-body">
        <div class="source-bar">
          <span id="sourceStatus" class="source-status">数据源：本地演示</span>
          <button id="loadCloudBtn" class="icon-btn" type="button" title="从 Supabase 拉取" aria-label="从 Supabase 拉取">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v10"/><path d="m8 10 4 4 4-4"/><path d="M4 19h16"/></svg>
          </button>
          <button id="seedCloudBtn" class="icon-btn" type="button" title="初始化示例数据到 Supabase" aria-label="初始化示例数据到 Supabase">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20V10"/><path d="m8 14 4-4 4 4"/><path d="M4 5h16"/></svg>
          </button>
        </div>
        <div class="icon-legend">
          <span><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v10"/><path d="m8 10 4 4 4-4"/><path d="M4 19h16"/></svg>拉取</span>
          <span><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20V10"/><path d="m8 14 4-4 4 4"/><path d="M4 5h16"/></svg>初始化</span>
          <span><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>新增</span>
        </div>
        <div class="kpi-grid" id="kpiGrid"></div>
        <div class="filters">
          <select id="statusFilter">
            <option value="all">全部状态</option>
            <option value="red">仅红色</option>
            <option value="yellow">仅黄色</option>
            <option value="green">仅绿色</option>
          </select>
          <select id="redlineFilter">
            <option value="all">全部红线</option>
            <option value="工期">工期红线</option>
            <option value="利润">利润红线</option>
            <option value="回款">回款红线</option>
          </select>
          <button id="resetBtn" type="button">重置筛选</button>
          <button id="addMasterBtn" class="icon-btn" type="button" title="新增子项目" aria-label="新增子项目">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          </button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>子项目</th>
                <th>范围状态</th>
                <th>进度状态</th>
                <th>成本状态</th>
                <th>采购状态</th>
                <th>资源状态</th>
                <th>风险状态</th>
                <th>回款状态</th>
                <th>当前红线</th>
                <th>负责人</th>
                <th>财务</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="masterTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="projectWorkbench" class="panel hidden">
      <div class="head">
        <h2 id="workbenchTitle">子项目管理</h2>
        <button id="closeWorkbenchBtn" type="button" class="btn-secondary">关闭</button>
      </div>
      <div class="section-body">
        <form id="workbenchForm" class="crud-form">
          <div class="form-grid">
            <label>子项目
              <input id="workbenchNameInput" readonly />
            </label>
            <label>负责人
              <input id="workbenchOwnerInput" required />
            </label>
            <label>范围状态
              <select id="workbenchScopeInput">
                <option value="green">绿</option>
                <option value="yellow">黄</option>
                <option value="red">红</option>
              </select>
            </label>
            <label>进度状态
              <select id="workbenchScheduleInput">
                <option value="green">绿</option>
                <option value="yellow">黄</option>
                <option value="red">红</option>
              </select>
            </label>
            <label>成本状态
              <select id="workbenchCostInput">
                <option value="green">绿</option>
                <option value="yellow">黄</option>
                <option value="red">红</option>
              </select>
            </label>
            <label>采购状态
              <select id="workbenchProcurementInput">
                <option value="green">绿</option>
                <option value="yellow">黄</option>
                <option value="red">红</option>
              </select>
            </label>
            <label>资源状态
              <select id="workbenchResourceInput">
                <option value="green">绿</option>
                <option value="yellow">黄</option>
                <option value="red">红</option>
              </select>
            </label>
            <label>风险状态
              <select id="workbenchRiskInput">
                <option value="green">绿</option>
                <option value="yellow">黄</option>
                <option value="red">红</option>
              </select>
            </label>
            <label>回款状态
              <select id="workbenchCollectionInput">
                <option value="green">绿</option>
                <option value="yellow">黄</option>
                <option value="red">红</option>
              </select>
            </label>
            <label>当前红线
              <select id="workbenchRedlineInput">
                <option value="无">无</option>
                <option value="工期">工期</option>
                <option value="利润">利润</option>
                <option value="回款">回款</option>
                <option value="工期 / 利润">工期 / 利润</option>
                <option value="利润 / 回款">利润 / 回款</option>
                <option value="工期 / 回款">工期 / 回款</option>
                <option value="工期 / 利润 / 回款">工期 / 利润 / 回款</option>
              </select>
            </label>
            <label>合同金额
              <input id="workbenchContractInput" type="number" min="0" step="0.01" />
            </label>
            <label>目标成本
              <input id="workbenchTargetCostInput" type="number" min="0" step="0.01" />
            </label>
            <label>已发生成本
              <input id="workbenchActualCostInput" type="number" min="0" step="0.01" />
            </label>
            <label>预计完工成本
              <input id="workbenchForecastCostInput" type="number" min="0" step="0.01" />
            </label>
            <label>应回款
              <input id="workbenchPlannedCollectionInput" type="number" min="0" step="0.01" />
            </label>
            <label>已回款
              <input id="workbenchActualCollectionInput" type="number" min="0" step="0.01" />
            </label>
          </div>
          <div class="form-actions">
            <button type="submit">保存子项目状态</button>
            <button id="workbenchAddRiskBtn" type="button" class="btn-secondary">新增该项目风险/问题</button>
            <button id="workbenchAddDecisionBtn" type="button" class="btn-secondary">新增该项目决议</button>
          </div>
        </form>
        <div class="finance-metrics" id="financeMetrics"></div>
        <div class="split-grid">
          <div class="panel">
            <div class="section-body" style="padding-top: 0;">
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>编号</th>
                      <th>描述</th>
                      <th>状态</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="workbenchRiskBody"></tbody>
                </table>
              </div>
            </div>
          </div>
          <div class="panel">
            <div class="section-body" style="padding-top: 0;">
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>事项</th>
                      <th>状态</th>

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function normalizeLight(value) {
      return ["green", "yellow", "red"].includes(value) ? value : "green";
    }

    function shortDate(value) {
      if (!value) return "";
      return String(value).slice(0, 10);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function encodeKey(value) {
      return encodeURIComponent(String(value ?? ""));
    }

    function decodeKey(value) {
      return decodeURIComponent(value || "");
    }

    function setSourceStatus(text, tone) {
      const el = document.getElementById("sourceStatus");
      el.textContent = text;
      el.className = "source-status";
      if (tone) {
        el.classList.add(tone);
      }
    }

    function notifyCrudSynced(subject) {
      if (supabaseClient) {
        setSourceStatus(`数据源：Supabase 已同步（${subject}）`, "active");
      } else {
        setSourceStatus(`数据源：本地演示已更新（${subject}）`);
      }
    }

    function statusBadge(code) {
      const safeCode = normalizeLight(code);
      return `<span class="status ${safeCode}">${textMap[safeCode]}</span>`;
    }

    function rowOverallStatus(row) {
      const fields = [row.scope, row.schedule, row.cost, row.procurement, row.resource, row.risk, row.collection];
      if (fields.includes("red")) return "red";
      if (fields.includes("yellow")) return "yellow";
      return "green";
    }

    function mapMasterToDb(row) {
      return {
        subproject: row.name,
        scope_status: row.scope,
        schedule_status: row.schedule,
        cost_status: row.cost,
        procurement_status: row.procurement,
        resource_status: row.resource,
        risk_status: row.risk,
        collection_status: row.collection,
        current_redline: row.redline,
        owner: row.owner
      };
    }

    function mapMasterFinanceToDb(row) {
      return {
        subproject: row.name,
        contract_amount: Number(row.contractAmount || 0),
        target_cost: Number(row.targetCost || 0),
        actual_cost: Number(row.actualCost || 0),
        forecast_cost: Number(row.forecastCost || 0),
        planned_collection: Number(row.plannedCollection || 0),
        actual_collection: Number(row.actualCollection || 0)
      };
    }

    function mapRiskToDb(row) {
      return {
        issue_code: row.id,
        issue_type: row.type,
        description: row.desc,
        impacted_site: row.site,
        severity: row.severity,
        owner: row.owner,
        due_date: row.due || null,
        current_status: row.status
      };

    function mapDecisionToDb(row) {
      return {
        item: row.item,
        resolution: row.resolution,
        owner: row.owner,
        due_date: row.finish || null,
        current_status: row.status
      };
    }

    function toNumber(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function money(v) {
      return toNumber(v).toLocaleString("zh-CN");
    }

    function selectEditor(value, options, attrs) {
      const opts = options
        .map((x) => `<option value="${escapeHtml(x)}" ${x === value ? "selected" : ""}>${escapeHtml(x)}</option>`)
        .join("");
      return `<select ${attrs}>${opts}</select>`;
    }

    function inputEditor(value, attrs) {
      return `<input value="${escapeHtml(value ?? "")}" ${attrs} />`;
    }

    function saveStateBadge(table, key) {
      const status = rowSaveState[table][key];
      if (!status) return "";
      const labelMap = {
        saving: "保存中",
        success: "已保存",
        error: "失败"
      };
      return `<span class="save-state ${status}">${labelMap[status] || ""}</span>`;
    }

    function markRowSaving(table, key) {
      rowSaveState[table][key] = "saving";
      renderAll();
    }

    function markRowSaved(table, key) {
      rowSaveState[table][key] = "success";
      renderAll();
      setTimeout(() => {
        if (rowSaveState[table][key] === "success") {
          delete rowSaveState[table][key];
          renderAll();
        }
      }, 1800);
    }

    function markRowSaveError(table, key) {
      rowSaveState[table][key] = "error";
      renderAll();
    }

    function renderFinanceMetrics(values) {
      const metricsEl = document.getElementById("financeMetrics");
      if (!metricsEl || !values) return;
      const contract = toNumber(values.contractAmount);
      const targetCost = toNumber(values.targetCost);
      const forecastCost = toNumber(values.forecastCost);
      const plannedCollection = toNumber(values.plannedCollection);
      const actualCollection = toNumber(values.actualCollection);

      const grossRate = contract > 0 ? ((contract - forecastCost) / contract) * 100 : 0;
      const costVariance = forecastCost - targetCost;
      const collectionRate = plannedCollection > 0 ? (actualCollection / plannedCollection) * 100 : 0;

      const grossTone = grossRate >= 10 ? "success" : grossRate >= 0 ? "saving" : "error";
      const costTone = costVariance <= 0 ? "success" : costVariance < contract * 0.05 ? "saving" : "error";
      const collectionTone = collectionRate >= 90 ? "success" : collectionRate >= 60 ? "saving" : "error";

      metricsEl.innerHTML = `
        <article><small>毛利率</small><strong class="${grossTone === "success" ? "status green" : grossTone === "error" ? "status red" : "status yellow"}">${grossRate.toFixed(1)}%</strong></article>
        <article><small>成本偏差（预计-目标）</small><strong class="${costTone === "success" ? "status green" : costTone === "error" ? "status red" : "status yellow"}">${costVariance >= 0 ? "+" : ""}${money(costVariance)}</strong></article>
        <article><small>回款率</small><strong class="${collectionTone === "success" ? "status green" : collectionTone === "error" ? "status red" : "status yellow"}">${collectionRate.toFixed(1)}%</strong></article>
      `;
    }

          <td>${selectEditor(draft.redline, redlineOptions, `data-table=\"master\" data-field=\"redline\" data-key=\"${encodeKey(key)}\"`)}</td>

      const viewRows = rows

              <td>${statusBadge(r.scope)}</td>
              <td>${statusBadge(r.schedule)}</td>
              <td>${statusBadge(r.cost)}</td>
              <td>${statusBadge(r.procurement)}</td>
              <td>${statusBadge(r.resource)}</td>
              <td>${statusBadge(r.risk)}</td>
              <td>${statusBadge(r.collection)}</td>
              <td>${escapeHtml(r.redline)}</td>
              <td>${escapeHtml(r.owner)}</td>
              <td>合同 ${money(r.contractAmount)} / 回款 ${money(r.actualCollection)}</td>
              <td class="action-cell">
                <button type="button" class="btn-small" data-action="edit-master" data-key="${encodeKey(r.name)}">编辑</button>
                <button type="button" class="btn-small btn-danger" data-action="delete-master" data-key="${encodeKey(r.name)}">删除</button>
                ${saveStateBadge("master", r.name)}
              </td>
            </tr>
          `;
        })
        .join("");

      const createRow =
        masterEditMode.type === "create"
          ? editRow(masterEditMode.draft, "__new__", true)
          : "";

      body.innerHTML = createRow + viewRows;

      if (icon === "sites") {
        return '<svg viewBox="0 0 24 24"><path d="M4 20V9l8-5 8 5v11"/><path d="M9 20v-6h6v6"/></svg>';

        return '<svg viewBox="0 0 24 24"><path d="M12 3 2.5 20h19z"/><path d="M12 9v4"/><path d="M12 16h.01"/></svg>';

      if (icon === "red") {
        return '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m9 9 6 6"/><path d="m15 9-6 6"/></svg>';
      }
      if (icon === "clock") {
        return '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v6l4 2"/></svg>';
      }
      return '<svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>';
    }

    function getProjectCode(projectName) {
      return String(projectName || "").split("（")[0].trim();
    }

    function matchesProject(projectName, siteName) {
      const code = getProjectCode(projectName);
      const site = String(siteName || "").trim();
      return site && (projectName.includes(site) || site.includes(code) || code.includes(site));
    }

    function renderWorkbench() {
      const panel = document.getElementById("projectWorkbench");
      const metricsEl = document.getElementById("financeMetrics");
      if (!activeProjectKey) {
        panel.classList.add("hidden");
        if (metricsEl) metricsEl.innerHTML = "";
        return;
      }

      const row = masterRows.find((x) => x.name === activeProjectKey);
      if (!row) {
        activeProjectKey = null;
        panel.classList.add("hidden");
        if (metricsEl) metricsEl.innerHTML = "";
        return;
      }

      panel.classList.remove("hidden");
      document.getElementById("workbenchTitle").textContent = `子项目管理：${row.name}`;
      document.getElementById("workbenchNameInput").value = row.name;

    async function upsertMasterCloud(row, oldKey) {
      if (!supabaseClient) return;
      if (oldKey && oldKey !== row.name) {
        const oldDelete = await supabaseClient.from("pmo_master_control").delete().eq("subproject", oldKey);
        if (oldDelete.error) throw oldDelete.error;
      }
      const write = await supabaseClient.from("pmo_master_control").upsert(mapMasterToDb(row), {
        onConflict: "subproject"
      });
      if (write.error) throw write.error;

      const financeWrite = await supabaseClient.from("pmo_project_finance").upsert(mapMasterFinanceToDb(row), {
        onConflict: "subproject"
      });
      if (
        financeWrite.error &&
        !financeWrite.error.message.includes("relation") &&
        !financeWrite.error.message.includes("column") &&
        !financeWrite.error.message.includes("table") &&
        !financeWrite.error.message.includes("schema cache")
      ) {
        throw financeWrite.error;
      }
    }

    async function deleteMasterCloud(key) {
      if (!supabaseClient) return;
      const del = await supabaseClient.from("pmo_master_control").delete().eq("subproject", key);
      if (del.error) throw del.error;
      await supabaseClient.from("pmo_project_finance").delete().eq("subproject", key);
    }

    async function upsertRiskCloud(row, oldKey) {
      if (!supabaseClient) return;
      if (oldKey && oldKey !== row.id) {
        const oldDelete = await supabaseClient.from("pmo_risk_issue_log").delete().eq("issue_code", oldKey);
        if (oldDelete.error) throw oldDelete.error;
      }
      const write = await supabaseClient.from("pmo_risk_issue_log").upsert(mapRiskToDb(row), {
        onConflict: "issue_code"
      });
      if (write.error) throw write.error;
    }

    async function deleteRiskCloud(key) {
      if (!supabaseClient) return;
      const del = await supabaseClient.from("pmo_risk_issue_log").delete().eq("issue_code", key);
      if (del.error) throw del.error;
    }

    async function upsertDecisionCloud(row, oldKey) {
      if (!supabaseClient) return;
      if (oldKey && oldKey !== row.item) {
        const oldDelete = await supabaseClient.from("pmo_meeting_decisions").delete().eq("item", oldKey);
        if (oldDelete.error) throw oldDelete.error;
      }
      const write = await supabaseClient.from("pmo_meeting_decisions").upsert(mapDecisionToDb(row), {
        onConflict: "item"
      });
      if (write.error) throw write.error;
    }

    async function deleteDecisionCloud(key) {
      if (!supabaseClient) return;
      const del = await supabaseClient.from("pmo_meeting_decisions").delete().eq("item", key);
      if (del.error) throw del.error;
    }

    function upsertLocalMaster(row, oldKey) {
      const target = oldKey || row.name;
      const idx = masterRows.findIndex((x) => x.name === target);
      if (idx >= 0) {
        masterRows[idx] = row;
      } else {
        masterRows.unshift(row);
      }
    }

    function upsertLocalRisk(row, oldKey) {
      const target = oldKey || row.id;
      const idx = riskIssues.findIndex((x) => x.id === target);
      if (idx >= 0) {
        riskIssues[idx] = row;
      } else {
        riskIssues.unshift(row);
      }
    }

    function upsertLocalDecision(row, oldKey) {
      const target = oldKey || row.item;
      const idx = decisions.findIndex((x) => x.item === target);
      if (idx >= 0) {
        decisions[idx] = row;
      } else {
        decisions.unshift(row);
      }
    }

    async function handleWorkbenchSubmit(event) {
      event.preventDefault();
      const row = getWorkbenchFormData();
      if (!row.name || !row.owner) {
        alert("子项目和负责人不能为空。");
        return;
      }
      try {
        markRowSaving("master", row.name);
        await upsertMasterCloud(row, row.name);
        upsertLocalMaster(row, row.name);
        markRowSaved("master", row.name);
        renderAll();
        notifyCrudSynced("子项目状态已更新");
      } catch (error) {
        console.error(error);
        markRowSaveError("master", row.name);
        setSourceStatus("数据源：子项目状态保存失败", "error");
        alert(`保存失败：${error.message || "未知错误"}`);

    function patchEditorDraft(modeRef, key, field, value) {
      if (!modeRef.draft) return;
      const matchEdit = modeRef.type === "edit" && modeRef.key === key;
      const matchCreate = modeRef.type === "create" && key === "__new__";
      if (matchEdit || matchCreate) {
        modeRef.draft[field] = value;
      }
    }

    function onTableEditorInput(event) {
      const target = event.target.closest("[data-table][data-field][data-key]");
      if (!target) return;
      const key = decodeKey(target.dataset.key);
      const field = target.dataset.field;
      const value = target.value;
      if (target.dataset.table === "master") {
        patchEditorDraft(masterEditMode, key, field, value);
      }
      if (target.dataset.table === "risk") {
        patchEditorDraft(riskEditMode, key, field, value);
      }
      if (target.dataset.table === "decision") {
        patchEditorDraft(decisionEditMode, key, field, value);
      }
    }

        alert("子项目和负责人不能为空。");
        return;

      const oldKey = masterEditMode.type === "edit" ? masterEditMode.key : null;
      if (oldKey !== draft.name && masterRows.some((x) => x.name === draft.name)) {
        alert("子项目名称已存在，请修改后再保存。");
        return;
      }
      try {
        markRowSaving("master", key || oldKey || draft.name);
        await upsertMasterCloud(draft, oldKey);
        upsertLocalMaster(draft, oldKey);
        if (activeProjectKey === oldKey) activeProjectKey = draft.name;
        masterEditMode = { type: null, key: null, draft: null };
        if (oldKey && oldKey !== draft.name) {

        delete rowSaveState.master["__new__"];

        document.getElementById("riskTableBody").scrollIntoView({ behavior: "smooth", block: "start" });
      }
      if (button.dataset.action === "wb-delete-risk") {
        deleteRiskRecord(key);
      }
      if (button.dataset.action === "wb-edit-decision") {
        startDecisionEdit(key);
        document.getElementById("decisionTableBody").scrollIntoView({ behavior: "smooth", block: "start" });
      }
      if (button.dataset.action === "wb-delete-decision") {
        deleteDecisionRecord(key);
      }
    }

    async function loadCloudData() {
      if (!supabaseClient) {
        setSourceStatus("数据源：未配置 Supabase，无法拉取", "error");
        return;
      }

      setSourceStatus("数据源：Supabase 拉取中...", "active");

      try {
        const [masterRes, riskRes, decisionsRes, financeRes] = await Promise.all([
          supabaseClient.from("pmo_master_control").select("*").order("subproject"),
          supabaseClient.from("pmo_risk_issue_log").select("*").order("issue_code"),
          supabaseClient.from("pmo_meeting_decisions").select("*").order("item"),
          supabaseClient.from("pmo_project_finance").select("*").order("subproject")
        ]);

        const financeError =
          financeRes.error &&
          !financeRes.error.message.includes("relation") &&
          !financeRes.error.message.includes("column") &&
          !financeRes.error.message.includes("table") &&
          !financeRes.error.message.includes("schema cache")
            ? financeRes.error
            : null;

        const errors = [masterRes.error, riskRes.error, decisionsRes.error, financeError].filter(Boolean);
        if (errors.length) {
          throw new Error(errors.map((e) => e.message).join(" | "));
        }

        const hasAnyRemoteData = [masterRes.data, riskRes.data, decisionsRes.data].some(
          (rows) => Array.isArray(rows) && rows.length > 0
        );

        const financeMap = new Map();
        if (Array.isArray(financeRes.data)) {
          financeRes.data.forEach((row) => {
            financeMap.set(row.subproject, {
              contractAmount: toNumber(row.contract_amount),
              targetCost: toNumber(row.target_cost),
              actualCost: toNumber(row.actual_cost),
              forecastCost: toNumber(row.forecast_cost),
              plannedCollection: toNumber(row.planned_collection),
              actualCollection: toNumber(row.actual_collection)
            });
          });
        }

        if (Array.isArray(masterRes.data) && masterRes.data.length > 0) {
          masterRows = masterRes.data.map((row) => ({
            name: row.subproject || "",
            scope: normalizeLight(row.scope_status),
            schedule: normalizeLight(row.schedule_status),
            cost: normalizeLight(row.cost_status),
            procurement: normalizeLight(row.procurement_status),
            resource: normalizeLight(row.resource_status),
            risk: normalizeLight(row.risk_status),
            collection: normalizeLight(row.collection_status),
            redline: row.current_redline || "无",
            owner: row.owner || "",
            ...financeMap.get(row.subproject)
          }));
        }

        if (Array.isArray(riskRes.data) && riskRes.data.length > 0) {
          riskIssues = riskRes.data.map((row) => ({
            id: row.issue_code || "",
            type: row.issue_type || "",
            desc: row.description || "",
            site: row.impacted_site || "",
            severity: row.severity || "",
            owner: row.owner || "",
            due: shortDate(row.due_date),
            status: row.current_status || ""
          }));
        }

        if (Array.isArray(decisionsRes.data) && decisionsRes.data.length > 0) {
          decisions = decisionsRes.data.map((row) => ({
            item: row.item || "",
            resolution: row.resolution || "",
            owner: row.owner || "",
            finish: shortDate(row.due_date),
            status: row.current_status || ""
          }));
        }

        masterEditMode = { type: null, key: null, draft: null };
        riskEditMode = { type: null, key: null, draft: null };
        decisionEditMode = { type: null, key: null, draft: null };
        renderAll();

        if (!hasAnyRemoteData) {
          setSourceStatus("数据源：Supabase 已连接（表为空，仍显示本地示例）", "active");
          return;
        }

        setSourceStatus(
          `数据源：Supabase 在线（最近拉取 ${new Date().toLocaleString("zh-CN", { hour12: false })}）`,
          "active"
        );
      } catch (error) {
        console.error(error);
        setSourceStatus("数据源：拉取失败，已回退本地演示", "error");
      }
    }

    async function seedCloudData() {
      if (!supabaseClient) {
        setSourceStatus("数据源：未配置 Supabase，无法初始化", "error");
        return;
      }

      setSourceStatus("数据源：正在写入 Supabase...", "active");

      try {
        const masterPayload = localSeed.masterRows.map(mapMasterToDb);
        const financePayload = localSeed.masterRows.map(mapMasterFinanceToDb);
        const riskPayload = localSeed.riskIssues.map(mapRiskToDb);
        const decisionsPayload = localSeed.decisions.map(mapDecisionToDb);

        const [masterWrite, riskWrite, decisionsWrite, financeWrite] = await Promise.all([
          supabaseClient.from("pmo_master_control").upsert(masterPayload, { onConflict: "subproject" }),
          supabaseClient.from("pmo_risk_issue_log").upsert(riskPayload, { onConflict: "issue_code" }),
          supabaseClient.from("pmo_meeting_decisions").upsert(decisionsPayload, { onConflict: "item" }),
          supabaseClient.from("pmo_project_finance").upsert(financePayload, { onConflict: "subproject" })
        ]);

        const financeError =
          financeWrite.error &&
          !financeWrite.error.message.includes("relation") &&
          !financeWrite.error.message.includes("column") &&
          !financeWrite.error.message.includes("table") &&
          !financeWrite.error.message.includes("schema cache")
            ? financeWrite.error
            : null;
        const errors = [masterWrite.error, riskWrite.error, decisionsWrite.error, financeError].filter(Boolean);
        if (errors.length) {
          throw new Error(errors.map((e) => e.message).join(" | "));
        }

        setSourceStatus("数据源：示例数据已写入 Supabase，可点击拉取验证", "active");
      } catch (error) {
        console.error(error);
        setSourceStatus("数据源：初始化失败，请检查表结构/RLS 策略", "error");
      }
    }

    function bindEvents() {
      document.getElementById("statusFilter").addEventListener("change", applyFilters);
      document.getElementById("redlineFilter").addEventListener("change", applyFilters);
      document.getElementById("resetBtn").addEventListener("click", () => {
        document.getElementById("statusFilter").value = "all";
        document.getElementById("redlineFilter").value = "all";
        applyFilters();
      });
      document.getElementById("loadCloudBtn").addEventListener("click", loadCloudData);
      document.getElementById("seedCloudBtn").addEventListener("click", seedCloudData);
      document.getElementById("addMasterBtn").addEventListener("click", () => {
        delete rowSaveState.master["__new__"];
        masterEditMode = { type: "create", key: "__new__", draft: createMasterDraft() };
        renderAll();
      });
      document.getElementById("addRiskBtn").addEventListener("click", () => {
        delete rowSaveState.risk["__new__"];
        riskEditMode = { type: "create", key: "__new__", draft: createRiskDraft() };
        renderAll();
      });
      document.getElementById("addDecisionBtn").addEventListener("click", () => {
        delete rowSaveState.decision["__new__"];
        decisionEditMode = { type: "create", key: "__new__", draft: createDecisionDraft() };
        renderAll();
      });

      document.getElementById("masterTableBody").addEventListener("click", onMasterTableAction);
      document.getElementById("masterTableBody").addEventListener("input", onTableEditorInput);
      document.getElementById("masterTableBody").addEventListener("change", onTableEditorInput);
      document.getElementById("workbenchForm").addEventListener("submit", handleWorkbenchSubmit);
      document.getElementById("workbenchForm").addEventListener("input", () => {
        if (activeProjectKey) {
          renderFinanceMetrics(getWorkbenchFormData());
        }
      });
      document.getElementById("closeWorkbenchBtn").addEventListener("click", closeWorkbench);
      document.getElementById("workbenchAddRiskBtn").addEventListener("click", quickAddRiskForActiveProject);
      document.getElementById("workbenchAddDecisionBtn").addEventListener("click", quickAddDecisionForActiveProject);
      document.getElementById("workbenchRiskBody").addEventListener("click", onWorkbenchTableAction);
      document.getElementById("workbenchDecisionBody").addEventListener("click", onWorkbenchTableAction);

      document.getElementById("riskTableBody").addEventListener("click", onRiskTableAction);
      document.getElementById("riskTableBody").addEventListener("input", onTableEditorInput);
      document.getElementById("riskTableBody").addEventListener("change", onTableEditorInput);

      document.getElementById("decisionTableBody").addEventListener("click", onDecisionTableAction);
      document.getElementById("decisionTableBody").addEventListener("input", onTableEditorInput);
      document.getElementById("decisionTableBody").addEventListener("change", onTableEditorInput);
    }

    function init() {
      masterEditMode = { type: null, key: null, draft: null };
      riskEditMode = { type: null, key: null, draft: null };
      decisionEditMode = { type: null, key: null, draft: null };
      renderAll();
      closeWorkbench();
      bindEvents();
      initSupabaseClient();
    }

    init();
  </script>
</body>
